services:
  web:
    build: .
    container_name: car_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: car_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: car_rent
      MYSQL_USER: caruser
      MYSQL_PASSWORD: carpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./car_rent_dump.sql:/docker-entrypoint-initdb.d/car_rent_dump.sql

volumes:
  db_data: